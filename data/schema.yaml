$schema: http://json-schema.org/draft-07/schema#
type: object
properties:
  messages:
    type: array
    items:
      type: object
      properties:
        is_from_me:
          type: integer
          description: Indicator of whether the message is from the user (1) or not (0)
        message_text:
          type: string
          description: Text content of the message
        date:
          type: string
          format: date-time
          description: Date and time the message was sent
        date_read:
          type: [string, null]
          format: date-time
          description: Date and time the message was read (null if not read)
        service:
          type: string
          description: Service used for the message (e.g., 'imessage')
        participants:
          type: array
          items:
            type: string
            description: Phone numbers of participants in the conversation
          description: List of participants' phone numbers
        sender:
          type: string
          description: Phone number of the sender
        receiver:
          type: array
          items:
            type: string
            description: Phone numbers of receivers
          description: List of receivers' phone numbers
        attachments:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
                description: Path to the attachment file
              type:
                type: string
                description: MIME type of the attachment
            description: Attachment details
          description: List of attachments
        message_segments:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: Type of message segment (e.g., 'text', 'file', 'reaction')
              text:
                type: [string, null]
                description: Text content of the segment (null if not applicable)
              file_type:
                type: [string, null]
                description: File type of the segment (null if not applicable)
              path:
                type: [string, null]
                description: Path to the file (null if not applicable)
              reaction_type:
                type: [string, null]
                description: Type of reaction (null if not applicable)
            description: Message segment details
          description: List of message segments
        _debug:
          type: object
          properties:
            _id:
              type: string
              description: Unique identifier for debugging
            message_id:
              type: integer
              description: Message ID
            message_group:
              type: integer
              description: Message group ID
            message_type:
              type: string
              description: Type of message (e.g., 'Individual')
            me:
              type: string
              description: Phone number of the user
            address:
              type: string
              description: Phone number of the sender
            participants:
              type: string
              description: Participants' phone numbers (comma-separated)
            associated_message_guid:
              type: [string, null]
              description: Associated message GUID (null if not applicable)
          description: Debugging information
        sha:
          type: string
          description: SHA hash of the message
        associated_sha:
          type: [string, null]
          description: SHA hash of the associated message (null if not applicable)
      required:
        - is_from_me
        - message_text
        - date
      description: Message object
    description: Array of messages
required:
  - messages
description: Root object containing messages
